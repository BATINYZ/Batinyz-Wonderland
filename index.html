<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>göktürk batuhan çağla kaçın - Jungle Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-banner">
        <div class="vine vine-left"></div>
        <h1>göktürk batuhan çağla kaçın</h1>
        <div class="vine vine-right"></div>
      </header>

      <div class="playfield-wrap">
        <aside class="tree tree-left">
          <div class="branch branch-a"></div>
          <div class="branch branch-b"></div>
          <div class="monkey monkey-a">&#128053;&#128079;</div>
          <div class="monkey monkey-b">&#128018;&#128079;</div>
        </aside>

        <main class="board-area">
          <div class="canvas-wrap">
            <div class="board-decor top">
              <span class="mini-tree"></span>
              <span class="mini-monkey">&#128053;&#128079;</span>
              <span class="mini-tree"></span>
              <span class="mini-monkey">&#128018;&#128079;</span>
            </div>
            <div class="board-decor left">
              <span class="mini-tree"></span>
              <span class="mini-monkey">&#128053;&#128079;</span>
            </div>
            <div class="board-decor right">
              <span class="mini-tree"></span>
              <span class="mini-monkey">&#128018;&#128079;</span>
            </div>
            <canvas id="game" width="480" height="480" aria-label="Snake game"></canvas>
            <div id="introOverlay" class="intro-overlay">
              <p class="intro-title">göktürk için tasarlandı</p>
              <p class="intro-sub">Ekrana tıkla ve oyunu başlat</p>
            </div>
          </div>

          <div class="hud">
            <div id="score">Skor: 0</div>
            <div id="status">Basla: Ok tuslari veya asagidaki tuslar</div>
          </div>

          <button id="restartBtn" class="restart-btn" type="button">Restart</button>

          <div class="controls dpad" aria-label="Mobile controls">
            <button class="btn-up" data-dir="up">&#9650;</button>
            <button class="btn-left" data-dir="left">&#9664;</button>
            <button class="btn-right" data-dir="right">&#9654;</button>
            <button class="btn-down" data-dir="down">&#9660;</button>
          </div>

          <div class="controls-decor">
            <span class="mini-tree"></span>
            <span class="mini-monkey">&#128053;&#128079;</span>
            <span class="mini-tree"></span>
            <span class="mini-monkey">&#128018;&#128079;</span>
          </div>
        </main>

        <aside class="tree tree-right">
          <div class="branch branch-c"></div>
          <div class="branch branch-d"></div>
          <div class="monkey monkey-c">&#128053;&#128079;</div>
          <div class="monkey monkey-d">&#128018;&#128079;</div>
        </aside>
      </div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
